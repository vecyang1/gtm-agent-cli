name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
      - run: go mod verify
      - run: go test ./...
      - run: go vet ./...
      - run: go build -o ./gtm-agent ./cmd/gtm-agent
      - run: ./scripts/e2e-fake-gtm.sh
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
